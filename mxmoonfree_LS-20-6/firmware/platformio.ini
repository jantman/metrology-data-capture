; Mxmoonfree LS-20-6 caliper -> USB HID keyboard (ESP32-S3)
;
; Build/upload with the native-USB DevKitC-1. Two USB jacks on the board:
;   - "UART" jack (CP210x/CH340): used for flashing + serial debug (Serial = UART0).
;   - "USB"  jack (native OTG, GPIO19/20): the HID keyboard enumerates here.
; Flash over the UART jack, then plug the USB jack into the computer that receives keystrokes.
;
; ARDUINO_USB_MODE=0  -> TinyUSB OTG stack (required for USBHIDKeyboard).
;                       (=1 would select the hardware USB-Serial/JTAG and HID would NOT work.)
; ARDUINO_USB_CDC_ON_BOOT=0 -> keep Serial on UART0 (the CP210x jack), so debug logging is
;                       independent of the HID port.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; The esp32-s3-devkitc-1 manifest forces ARDUINO_USB_MODE=1; strip it first so
; our =0 (TinyUSB) is the single definition, not an order-dependent redefine.
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
